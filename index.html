<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css">
    <title>Калькулятор</title>
  </head>
  <body>
    <p>
      <button class="calculate-button" onclick="updateCalculation('1')">1</button>
      <button class="calculate-button" onclick="updateCalculation('2')">2</button>
      <button class="calculate-button" onclick="updateCalculation('3')">3</button>
      <button class="calculate-button action-button" onclick="updateCalculation(' + ')">+</button>
    </p>
    <p>
      <button class="calculate-button" onclick="updateCalculation('4')">4</button>
      <button class="calculate-button" onclick="updateCalculation('5')">5</button>
      <button class="calculate-button" onclick="updateCalculation('6')">6</button>
      <button class="calculate-button action-button" onclick="updateCalculation(' - ')">-</button>
    </p>
    <p>
      <button class="calculate-button" onclick="updateCalculation('7')">7</button>
      <button class="calculate-button" onclick="updateCalculation('8')">8</button>
      <button class="calculate-button" onclick="updateCalculation('9')">9</button>
      <button class="calculate-button action-button" onclick="updateCalculation(' * ')">x</button>
    </p>
    <p>
    <p>
      <button class="calculate-button" onclick="updateCalculation('0')">0</button>
      <button class="calculate-button" onclick="updateCalculation('.')">.</button>
      <button class="calculate-button" onclick="
        calculation  = eval(calculation);
        console.log(calculation);
        localStorage.setItem('calculation', calculation);">=</button>
      <button class="calculate-button action-button" onclick="updateCalculation(' / ')">/</button>
    </p>
      <button class="calculate-button button-clear" onclick="
        calculation = '';
        console.log(calculation);
        localStorage.setItem('calculation', calculation);">Очистить</button>
    </p>

    <script src="js/main.js"></script>
  </body>
</html>
